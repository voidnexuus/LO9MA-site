<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LO9MA — Panneau d'administration</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17120E; --ink-soft:#201810; --ink-soft2:#2A2119;
  --cream:#F5F1E8; --cream-soft:#ECE6D6;
  --ember:#2FE1D4; --ember-light:#8FFFF2; --accent-text:#0EA89B;
  --line:rgba(246,239,226,0.12); --line-strong:rgba(246,239,226,0.22);
  --text-dim:#C9BFAE; --text-faint:#8C8272;
  --radius:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);color:var(--cream);font-family:'Manrope',sans-serif;font-size:15px;line-height:1.5;position:relative;}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle at 12% 8%, rgba(47,225,212,.10), transparent 32%),
    radial-gradient(circle at 88% 82%, rgba(201,162,39,.08), transparent 34%),
    radial-gradient(circle at 92% 15%, rgba(47,225,212,.06), transparent 28%);
  animation:bgDrift 18s ease-in-out infinite;
}
@keyframes bgDrift{0%,100%{opacity:.8;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
@media(prefers-reduced-motion: reduce){body::before{animation:none;}}
main.tab-anim{animation:tabFadeIn .45s var(--ease-soft, ease) both;}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;font-size:14px;width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line-strong);background:var(--ink-soft2);color:var(--cream);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--ember);border-color:var(--ember);}
label{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);display:block;margin-bottom:6px;}
::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:10px;}

/* Layout */
#gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;}
.gate-box{background:var(--ink-soft);border:1px solid var(--line);border-radius:20px;padding:40px;max-width:360px;width:100%;text-align:center;}
.gate-box h1{font-size:24px;margin-bottom:8px;}
.gate-box p{color:var(--text-dim);font-size:13px;margin-bottom:22px;}
.gate-box input{margin-bottom:14px;text-align:center;}
.gate-box button{width:100%;padding:13px;border-radius:10px;background:var(--ember);color:var(--ink);font-weight:700;border:none;}
.gate-error{color:#ff8a8a;font-size:12.5px;margin-top:10px;display:none;}

#app{display:none;min-height:100vh;grid-template-columns:230px 1fr;}
#app.show{display:grid;}
aside{background:var(--ink-soft);border-right:1px solid var(--line);padding:26px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{font-size:19px;margin-bottom:4px;position:relative;display:inline-block;}
.brand::after{
  content:'';position:absolute;left:0;bottom:-6px;width:36px;height:2px;border-radius:2px;
  background:var(--ember);box-shadow:0 0 10px 1px rgba(47,225,212,.6);
  animation:brandPulse 2.6s ease-in-out infinite;
}
@keyframes brandPulse{0%,100%{opacity:.6;width:36px;}50%{opacity:1;width:52px;}}
@media(prefers-reduced-motion: reduce){.brand::after{animation:none;}}
.brand small{display:block;font-family:'Space Mono',monospace;font-size:9.5px;color:var(--ember-light);letter-spacing:.15em;margin-top:2px;}
nav.tabs{margin-top:28px;display:flex;flex-direction:column;gap:4px;}
nav.tabs button{text-align:left;padding:11px 14px;border-radius:10px;border:none;background:transparent;color:var(--text-dim);font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;transition:all .3s var(--ease-soft, ease);}
nav.tabs button:hover{background:var(--ink-soft2);color:var(--cream);transform:translateX(3px);}
nav.tabs button.active{background:var(--ember);color:var(--ink);box-shadow:0 6px 18px -6px rgba(47,225,212,.4);}
.sidebar-foot{margin-top:30px;padding-top:20px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}

main{padding:34px 42px;max-width:980px;}

/* Right-side category quick-nav — vertical constellation/timeline */
.cat-quicknav{
  position:fixed;top:50%;right:18px;transform:translateY(-50%);z-index:60;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.cat-quicknav::before{
  content:'';position:absolute;top:8px;bottom:8px;right:5px;width:1px;
  background:linear-gradient(180deg, transparent, var(--line-strong) 10%, var(--line-strong) 90%, transparent);
  z-index:-1;
}
.qn-item{
  display:flex;align-items:center;gap:10px;padding:7px 4px;background:none;border:none;
  cursor:pointer;group:hover;position:relative;
}
.qn-dot{
  width:9px;height:9px;border-radius:50%;background:var(--ink-soft2);border:1.5px solid var(--line-strong);
  flex-shrink:0;transition:all .35s var(--ease, ease);
}
.qn-label{
  font-family:'Space Mono',monospace;font-size:11px;color:var(--text-faint);white-space:nowrap;
  opacity:0;transform:translateX(6px);transition:all .3s var(--ease, ease);
  background:var(--ink-soft);padding:4px 10px;border-radius:20px;border:1px solid var(--line);
}
.qn-item:hover .qn-label, .qn-item.active .qn-label{opacity:1;transform:translateX(0);}
.qn-item:hover .qn-dot{border-color:var(--ember);transform:scale(1.2);}
.qn-item.active .qn-dot{background:var(--ember);border-color:var(--ember);box-shadow:0 0 0 4px rgba(47,225,212,.2);transform:scale(1.3);}
.qn-item.active .qn-label{color:var(--ember-light);border-color:var(--ember);}
@media(max-width:1000px){.cat-quicknav .qn-label{display:none;}.cat-quicknav{right:8px;}}
@media(max-width:640px){.cat-quicknav{display:none;}}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;gap:16px;flex-wrap:wrap;}
.topbar h2{font-size:26px;}
.btn{padding:11px 20px;border-radius:10px;border:none;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--ember);color:var(--ink);}
.btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--cream);}
.btn-danger{background:transparent;border:1px solid rgba(255,120,120,.4);color:#ff9a9a;}
.btn-sm{padding:7px 13px;font-size:12px;}

.card{background:var(--ink-soft);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color .3s var(--ease-soft, ease), box-shadow .3s var(--ease-soft, ease);}
.card:hover{border-color:var(--line-strong);box-shadow:0 12px 30px -16px rgba(0,0,0,.5);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.field{margin-bottom:14px;}
.field.full{grid-column:1/-1;}
.section-title{font-size:12px;font-family:'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--ember-light);margin:26px 0 12px;}

.cat-block{border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;background:var(--ink-soft2);}
.cat-head{display:flex;gap:16px;align-items:center;margin-bottom:16px;}
.cat-head img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--line-strong);flex-shrink:0;}
.cat-head .grow{flex:1;}
.item-row{display:grid;grid-template-columns:70px 1.2fr 2fr 90px 90px 34px;gap:10px;align-items:start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--line);}
.item-row img{width:60px;height:60px;border-radius:10px;object-fit:cover;}
.item-row .rm{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid rgba(255,120,120,.35);color:#ff9a9a;font-size:16px;}
.upload-btn{font-size:11px;color:var(--ember-light);text-decoration:underline;cursor:pointer;display:inline-block;margin-top:4px;}
.gal-row{display:grid;grid-template-columns:70px 2fr 1.4fr 34px;gap:10px;align-items:start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--line);}
.gal-row img{width:60px;height:60px;border-radius:10px;object-fit:cover;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink-soft2);border:1px solid var(--line-strong);padding:14px 22px;border-radius:12px;transition:transform .4s;z-index:999;font-size:13.5px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.hint{background:rgba(47,225,212,.08);border:1px solid rgba(47,225,212,.25);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--text-dim);margin-bottom:20px;}
.hint b{color:var(--ember-light);}
@media(max-width:800px){
  #app.show{grid-template-columns:1fr;}
  aside{position:relative;height:auto;}
  main{padding:24px 18px;}
  .grid2,.grid3{grid-template-columns:1fr;}
  .item-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- Simple client-side gate (deterrent only, not real security) -->
<div id="gate">
  <div class="gate-box">
    <h1>🔐 LO9MA Admin</h1>
    <p>Accès réservé au gérant. Entrez le mot de passe pour continuer.</p>
    <input type="password" id="gatePw" placeholder="Mot de passe">
    <button onclick="checkPw()">Entrer</button>
    <div class="gate-error" id="gateError">Mot de passe incorrect.</div>
  </div>
</div>

<div id="app">
  <aside>
    <div class="brand">LO9MA<small>PANNEAU ADMIN</small></div>
    <nav class="tabs" id="tabs">
      <button data-tab="menu" class="active">🍕 Menu &amp; catégories</button>
      <button data-tab="about">📖 À propos</button>
      <button data-tab="contact">📍 Contact</button>
      <button data-tab="gallery">🖼️ Galerie</button>
      <button data-tab="orders">💬 Commandes</button>
      <button data-tab="export">⬇️ Exporter</button>
    </nav>
    <div class="sidebar-foot">
      <button class="btn btn-ghost btn-sm" onclick="resetAll()">↺ Réinitialiser</button>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div class="toast" id="toast">Modifications enregistrées</div>

<script>
const PASSWORD = 'lo9ma2026'; // change ce mot de passe directement ici dans le fichier
function checkPw(){
  const v=document.getElementById('gatePw').value;
  if(v===PASSWORD){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('show');
    init();
  } else {
    document.getElementById('gateError').style.display='block';
  }
}
document.getElementById('gatePw').addEventListener('keydown',e=>{ if(e.key==='Enter')checkPw(); });

function decodeTemplate(){
  return decodeURIComponent(escape(atob(SITE_TEMPLATE_B64)));
}

const HELPER_FNS_SOURCE = `
function img(id,w=600,h=450){return \`https://images.unsplash.com/photo-\${id}?auto=format&fit=crop&w=\${w}&h=\${h}&q=80\`;}
function imgTag(tag,lock,w=200,h=200){return \`https://loremflickr.com/\${w}/\${h}/\${tag}?lock=\${lock}\`;}
`;

function extractData(){
  const html = decodeTemplate();
  const s = html.indexOf(START_MARK);
  const e = html.indexOf(END_MARK) + END_MARK.length;
  let snippet = html.slice(s, e);
  snippet = snippet.replace('renderSiteInfo();', ''); // avoid executing DOM calls outside the real site
  const fn = new Function(HELPER_FNS_SOURCE + snippet + '; return {SITE_INFO, MENU, CAT_ORDER, GALLERY};');
  return fn();
}

const CAT_LABELS = {pizza:'🍕',crepe:'🥞',makloub:'🥙',lebanese:'🧆',plats:'🍽️',supplements:'🍟',extras:'➕',drinks:'🥤'};

let quickNavObserver=null;
function buildQuickNav(){
  const nav = document.getElementById('catQuickNav');
  if(!nav) return;
  nav.innerHTML = DATA.CAT_ORDER.map(key=>{
    const cat = DATA.MENU[key];
    return `<button type="button" class="qn-item" data-cat="${key}" title="${escAttr(cat.label)}">
      <span class="qn-dot"></span><span class="qn-label">${CAT_LABELS[key]||'●'} ${escAttr(cat.label)}</span>
    </button>`;
  }).join('');
  nav.querySelectorAll('.qn-item').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const target = document.getElementById('catblock-'+btn.dataset.cat);
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
  // Scrollspy: highlight the category currently in view
  if(quickNavObserver) quickNavObserver.disconnect();
  quickNavObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const key = entry.target.id.replace('catblock-','');
        nav.querySelectorAll('.qn-item').forEach(b=>b.classList.toggle('active', b.dataset.cat===key));
      }
    });
  }, {rootMargin:'-40% 0px -50% 0px', threshold:0});
  document.querySelectorAll('.cat-block').forEach(b=>quickNavObserver.observe(b));
}

let DATA = null; // working copy
const STORAGE_KEY = 'loqma_admin_draft_v1';

function init(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try{ DATA = JSON.parse(saved); }catch(e){ DATA = extractData(); }
  } else {
    DATA = extractData();
  }
  bindTabs();
  render('menu');
}
function resetAll(){
  if(!confirm('Réinitialiser toutes les modifications non exportées ?'))return;
  localStorage.removeItem(STORAGE_KEY);
  DATA = extractData();
  render(currentTab);
  showToast('Données réinitialisées');
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

let currentTab='menu';
function bindTabs(){
  document.querySelectorAll('#tabs button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      render(b.dataset.tab);
    });
  });
}

function fileToDataUrl(file, cb){
  const reader = new FileReader();
  reader.onload = ()=>cb(reader.result);
  reader.readAsDataURL(file);
}

function render(tab){
  currentTab = tab;
  const main = document.getElementById('main');
  main.classList.remove('tab-anim');
  void main.offsetWidth; // force reflow to restart animation
  main.classList.add('tab-anim');
  if(tab==='menu') return renderMenu(main);
  if(tab==='about') return renderAbout(main);
  if(tab==='contact') return renderContact(main);
  if(tab==='gallery') return renderGallery(main);
  if(tab==='orders') return renderOrders(main);
  if(tab==='export') return renderExport(main);
}

/* ---------------- MENU TAB ---------------- */
function renderMenu(main){
  main.innerHTML = `
    <div class="topbar"><h2>🍕 Menu &amp; catégories</h2></div>
    <div class="hint">Modifie le nom, la description, le prix ou la photo de chaque plat. Chaque catégorie a aussi sa <b>photo de couverture</b> (celle qui tourne autour du logo sur la page d'accueil).</div>
    <div id="catList"></div>
    <nav class="cat-quicknav" id="catQuickNav" aria-label="Accès rapide aux catégories"></nav>
  `;
  const list = document.getElementById('catList');
  DATA.CAT_ORDER.forEach(key=>{
    const cat = DATA.MENU[key];
    const block = document.createElement('div');
    block.className='cat-block';
    block.id = 'catblock-'+key;
    block.innerHTML = `
      <div class="cat-head">
        <img src="${cat.photo}" alt="">
        <div class="grow">
          <div class="grid2">
            <div class="field"><label>Nom de la catégorie</label><input data-bind="label" value="${escAttr(cat.label)}"></div>
            <div class="field"><label>Description courte</label><input data-bind="desc" value="${escAttr(cat.desc)}"></div>
          </div>
          <div class="field" style="margin-top:6px;">
            <label>Photo de couverture (URL) — ${CAT_LABELS[key]||''}</label>
            <input data-bind="photo" value="${escAttr(cat.photo)}">
            <label class="upload-btn">📤 Ou uploader une image<input type="file" accept="image/*" style="display:none" class="up-photo"></label>
          </div>
        </div>
      </div>
      <div class="section-title">Plats (${cat.items.filter(it=>!it.sizes).length})</div>
      <div class="items"></div>
      <button class="btn btn-ghost btn-sm add-item">+ Ajouter un plat</button>
      <div class="special-section-wrap"></div>
    `;
    // category field bindings
    block.querySelectorAll('[data-bind]').forEach(inp=>{
      inp.addEventListener('input',()=>{ cat[inp.dataset.bind]=inp.value; save(); if(inp.dataset.bind==='photo') block.querySelector('.cat-head img').src=inp.value; });
    });
    block.querySelector('.up-photo').addEventListener('change',(e)=>{
      const f=e.target.files[0]; if(!f)return;
      fileToDataUrl(f,url=>{ cat.photo=url; save(); render('menu'); showToast('Photo de catégorie mise à jour'); });
    });
    // items
    const itemsWrap = block.querySelector('.items');
    const specialWrap = block.querySelector('.special-section-wrap');

    function rowTemplate(i, it){
      return `
        <div class="item-row" data-i="${i}">
          <img src="${it.img}" alt="">
          <div class="field"><label>Nom</label><input data-f="name" value="${escAttr(it.name)}"></div>
          <div class="field"><label>Description</label><input data-f="desc" value="${escAttr(it.desc)}"></div>
          <div class="field"><label>${it.sizes?'Prix de base':'Prix (DT)'}</label><input data-f="price" type="number" step="0.5" value="${it.price}" ${it.sizes?'title="0 = le prix vient des tailles ci-dessous"':''}></div>
          <div class="field"><label>Tag</label><input data-f="tag" value="${escAttr(it.tag||'')}"></div>
          <button class="rm" title="Supprimer">✕</button>
        </div>
        <div class="field full" style="margin-top:-6px;">
          <label>Photo (URL)</label>
          <input data-f="img" value="${escAttr(it.img)}">
          <label class="upload-btn">📤 Ou uploader une image<input type="file" accept="image/*" style="display:none" class="up-item"></label>
        </div>`;
    }
    function specialBlockTemplate(i, it){
      if(!(it.sizes || it.toppingsList)) return '';
      return `
        <div class="special-block" data-si="${i}" style="background:var(--ink);border:1px dashed var(--line-strong);border-radius:12px;padding:14px;margin:6px 0 16px;">
          ${it.sizes ? `
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ember-light);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">📏 Tailles (avec nombre de garnitures incluses)</div>
          <div class="sizes-list"></div>
          <button type="button" class="btn btn-ghost btn-sm add-size" style="margin-top:4px;">+ Ajouter une taille</button>
          ` : ''}
          ${it.toppingsList ? `
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ember-light);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px;">🧀 Garnitures disponibles (et leur prix)</div>
          <div class="toppings-list"></div>
          <button type="button" class="btn btn-ghost btn-sm add-topping" style="margin-top:4px;">+ Ajouter une garniture</button>
          ` : ''}
        </div>`;
    }

    function paintItems(){
      const normalIdx = cat.items.map((it,i)=>i).filter(i=>!cat.items[i].sizes);
      const specialIdx = cat.items.map((it,i)=>i).filter(i=>cat.items[i].sizes);

      itemsWrap.innerHTML = normalIdx.map(i=>rowTemplate(i, cat.items[i])).join('');

      specialWrap.innerHTML = specialIdx.length ? `
        <div class="section-title" style="margin-top:30px;">📏 Formats spéciaux (tailles &amp; garnitures) — ${specialIdx.length}</div>
        <div class="hint" style="margin-bottom:16px;">Ces plats ont un format différent (ex: pizza mètre à la coupe) : le client choisit une taille, puis une garniture par section.</div>
        ${specialIdx.map(i=>rowTemplate(i, cat.items[i]) + specialBlockTemplate(i, cat.items[i])).join('<div style="height:14px;"></div>')}
      ` : '';

      block.querySelectorAll('.item-row').forEach(row=>{
        const i=+row.dataset.i;
        row.querySelectorAll('[data-f]').forEach(inp=>{
          inp.addEventListener('input',()=>{
            const f=inp.dataset.f;
            cat.items[i][f] = f==='price' ? parseFloat(inp.value||0) : inp.value;
            save();
            if(f==='img'){ row.querySelector('img').src=inp.value; }
          });
        });
        row.querySelector('.rm').addEventListener('click',()=>{
          if(!confirm(`Supprimer "${cat.items[i].name}" ?`))return;
          cat.items.splice(i,1); save(); paintItems();
        });
      });
      itemsWrap.querySelectorAll('.item-row').forEach(row=>{
        const i=+row.dataset.i;
        const photoField = row.nextElementSibling;
        const up = photoField ? photoField.querySelector('.up-item') : null;
        if(up) up.addEventListener('change',(e)=>{
          const f=e.target.files[0]; if(!f)return;
          fileToDataUrl(f,url=>{ cat.items[i].img=url; save(); paintItems(); showToast('Photo du plat mise à jour'); });
        });
      });
      specialWrap.querySelectorAll('.item-row').forEach(row=>{
        const i=+row.dataset.i;
        const photoField = row.nextElementSibling;
        const up = photoField ? photoField.querySelector('.up-item') : null;
        if(up) up.addEventListener('change',(e)=>{
          const f=e.target.files[0]; if(!f)return;
          fileToDataUrl(f,url=>{ cat.items[i].img=url; save(); paintItems(); showToast('Photo du plat mise à jour'); });
        });
      });
      // sizes / toppings sub-editors for special items (e.g. Pizza Mètre)
      block.querySelectorAll('.special-block').forEach(sb=>{
        const i = +sb.dataset.si;
        const it = cat.items[i];
        function paintSizes(){
          const wrap = sb.querySelector('.sizes-list'); if(!wrap) return;
          wrap.innerHTML = it.sizes.map((s,j)=>`
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr 32px;gap:8px;margin-bottom:8px;align-items:center;" data-j="${j}">
              <input data-sf="label" value="${escAttr(s.label)}" placeholder="Ex: Mètre entier (12-14 parts)">
              <input data-sf="price" type="number" step="0.5" value="${s.price}" placeholder="Prix DT">
              <input data-sf="slots" type="number" step="1" min="0" value="${s.slots||0}" placeholder="Nb garnitures" title="Nombre de garnitures incluses pour cette taille (0 = illimité)">
              <button class="rm rm-size" title="Supprimer">✕</button>
            </div>`).join('');
          wrap.querySelectorAll('[data-j]').forEach(rowEl=>{
            const j=+rowEl.dataset.j;
            rowEl.querySelectorAll('[data-sf]').forEach(inp=>{
              inp.addEventListener('input',()=>{
                const f=inp.dataset.sf;
                it.sizes[j][f] = (f==='price'||f==='slots') ? parseFloat(inp.value||0) : inp.value;
                save();
              });
            });
            rowEl.querySelector('.rm-size').addEventListener('click',()=>{
              if(it.sizes.length<=1){ alert('Il faut garder au moins une taille.'); return; }
              it.sizes.splice(j,1); save(); paintSizes();
            });
          });
        }
        function paintToppings(){
          const wrap = sb.querySelector('.toppings-list'); if(!wrap) return;
          wrap.innerHTML = it.toppingsList.map((t,j)=>`
            <div style="display:grid;grid-template-columns:2fr 1fr 32px;gap:8px;margin-bottom:8px;align-items:center;" data-j="${j}">
              <input data-tf="name" value="${escAttr(t.name)}" placeholder="Ex: Pepperoni">
              <input data-tf="price" type="number" step="0.5" value="${t.price}" placeholder="Prix DT">
              <button class="rm rm-topping" title="Supprimer">✕</button>
            </div>`).join('');
          wrap.querySelectorAll('[data-j]').forEach(rowEl=>{
            const j=+rowEl.dataset.j;
            rowEl.querySelectorAll('[data-tf]').forEach(inp=>{
              inp.addEventListener('input',()=>{
                const f=inp.dataset.tf;
                it.toppingsList[j][f] = f==='price' ? parseFloat(inp.value||0) : inp.value;
                save();
              });
            });
            rowEl.querySelector('.rm-topping').addEventListener('click',()=>{
              it.toppingsList.splice(j,1); save(); paintToppings();
            });
          });
        }
        if(it.sizes){
          paintSizes();
          sb.querySelector('.add-size').addEventListener('click',()=>{
            it.sizes.push({label:'Nouvelle taille', price:0, slots:0}); save(); paintSizes();
          });
        }
        if(it.toppingsList){
          paintToppings();
          sb.querySelector('.add-topping').addEventListener('click',()=>{
            it.toppingsList.push({name:'Nouvelle garniture', price:0}); save(); paintToppings();
          });
        }
      });
    }
    paintItems();
    block.querySelector('.add-item').addEventListener('click',()=>{
      cat.items.push({id:key+'_'+Date.now(), name:'Nouveau plat', desc:'Description courte', ingredients:'', price:10, img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=600&h=450&q=80', tag:''});
      save(); paintItems();
    });
    list.appendChild(block);
  });
  buildQuickNav();
}

        <p style="color:var(--text-faint);font-size:12px;margin-top:10px;">⚠️ Ce token permet de modifier ton dépôt. Il est enregistré uniquement dans ton navigateur (localStorage) — ne partage jamais ce fichier admin ni ce token à quelqu'un d'autre.</p>
      </details>
      <button class="btn btn-primary" style="width:100%;font-size:15px;padding:16px;" id="publishBtn">🚀 Publier sur GitHub maintenant</button>
      <p id="publishStatus" style="margin-top:14px;font-size:13px;color:var(--text-dim);"></p>
    </div>

    <div class="card">
      <div class="section-title">Option manuelle — Télécharger le fichier</div>
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:14px;">Si tu préfères ne pas utiliser de token, tu peux toujours télécharger le fichier et l'uploader toi-même sur GitHub.</p>
      <button class="btn btn-ghost" id="exportBtn">📥 Télécharger index.html</button>
    </div>
  `;
  document.getElementById('exportBtn').addEventListener('click', doExport);
  document.getElementById('publishBtn').addEventListener('click', doPublish);
  ['gh_owner','gh_repo','gh_branch','gh_token'].forEach(id=>{
    document.getElementById(id).addEventListener('input', saveGithubConfig);
  });
}

const GH_CONFIG_KEY = 'loqma_admin_github_config';
function getGithubConfig(){
  try{ return JSON.parse(localStorage.getItem(GH_CONFIG_KEY)) || {owner:'',repo:'',branch:'main',token:''}; }
  catch(e){ return {owner:'',repo:'',branch:'main',token:''}; }
}
function saveGithubConfig(){
  const cfg = {
    owner: document.getElementById('gh_owner').value.trim(),
    repo: document.getElementById('gh_repo').value.trim(),
    branch: document.getElementById('gh_branch').value.trim() || 'main',
    token: document.getElementById('gh_token').value.trim()
  };
  localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
}

function buildFinalHtml(){
  const html = decodeTemplate();
  const s = html.indexOf(START_MARK);
  const e = html.indexOf(END_MARK) + END_MARK.length;
  const before = html.slice(0, s);
  const after = html.slice(e);

  const newBlock = `${START_MARK}
const SITE_INFO = ${JSON.stringify(DATA.SITE_INFO, null, 2)};

${RENDER_FN_SOURCE}
renderSiteInfo();

/* ============================================================
   MENU DATA
   ============================================================ */
const MENU = ${JSON.stringify(DATA.MENU, null, 2)};
const CAT_ORDER = ${JSON.stringify(DATA.CAT_ORDER)};
const GALLERY=${JSON.stringify(DATA.GALLERY, null, 2)};
${END_MARK}`;

  return before + newBlock + after;
}

function doExport(){
  const finalHtml = buildFinalHtml();
  const blob = new Blob([finalHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'index.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Fichier téléchargé ✓');
}

function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m,p)=>String.fromCharCode('0x'+p)));
}

async function doPublish(){
  const owner = document.getElementById('gh_owner').value.trim();
  const repo = document.getElementById('gh_repo').value.trim();
  const branch = document.getElementById('gh_branch').value.trim() || 'main';
  const token = document.getElementById('gh_token').value.trim();
  const statusEl = document.getElementById('publishStatus');
  const btn = document.getElementById('publishBtn');

  if(!owner || !repo || !token){
    statusEl.textContent = '⚠️ Remplis le nom d\'utilisateur, le dépôt et le token avant de publier.';
    statusEl.style.color = '#ffb74a';
    return;
  }

  saveGithubConfig();
  btn.disabled = true;
  btn.textContent = '⏳ Publication en cours...';
  statusEl.style.color = 'var(--text-dim)';
  statusEl.textContent = 'Connexion à GitHub...';

  const path = 'index.html';
  const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

  try{
    const getRes = await fetch(`${apiBase}?ref=${encodeURIComponent(branch)}`, {
      headers:{ Authorization:`Bearer ${token}`, Accept:'application/vnd.github+json' }
    });
    if(!getRes.ok){
      if(getRes.status===404) throw new Error(`index.html introuvable dans ${owner}/${repo} (branche ${branch}). Vérifie les noms.`);
      if(getRes.status===401 || getRes.status===403) throw new Error('Token invalide ou permissions insuffisantes (il faut "Contents: Read and write").');
      throw new Error(`Erreur GitHub (${getRes.status})`);
    }
    const fileData = await getRes.json();
    const sha = fileData.sha;

    statusEl.textContent = 'Envoi des modifications...';
    const finalHtml = buildFinalHtml();
    const contentB64 = b64EncodeUnicode(finalHtml);

    const putRes = await fetch(apiBase, {
      method:'PUT',
      headers:{ Authorization:`Bearer ${token}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify({
        message: `Mise à jour du site via le panneau admin — ${new Date().toLocaleString('fr-FR')}`,
        content: contentB64,
        sha: sha,
        branch: branch
      })
    });
    if(!putRes.ok){
      const err = await putRes.json().catch(()=>({}));
      throw new Error(err.message || `Erreur lors de l'envoi (${putRes.status})`);
    }

    statusEl.style.color = '#7CFFB2';
    statusEl.textContent = '✅ Publié avec succès ! Ton site sera à jour dans 1 à 2 minutes.';
    showToast('Site publié sur GitHub ✓');
  }catch(err){
    statusEl.style.color = '#ff9a9a';
    statusEl.textContent = '❌ ' + err.message;
  }finally{
    btn.disabled = false;
    btn.textContent = '🚀 Publier sur GitHub maintenant';
  }
}

function esc(s){ return (s||'').replace(/</g,'&lt;'); }
function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
